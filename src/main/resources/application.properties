spring.application.name=file-scanner

server.port=${SERVERPORT}

#R2 variables
Thumbnail.Access.Key.ID=${THUMBNAILACCESSKEYID}
Thumbnail.Token.value=${THUMBNAILTOKENVALUE}
Thumbnail.Secret.Access.Key=${THUMBNAILSECRETACCESSKEY}
R2.URI=${R2URI}
First.Bucket.Name=${FIRSTBUCKETNAME}


#clamAV variables
clamAV.URI=${CLAMAVURI}
clamAV.Port=${CLAMAVPORT}

#Kafka Variables
kafka.filescan.topic=${KAFKAFILESCANTOPIC}
kafka.port=${KAFKAPORT}

#MYSQL variables
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

#actuator endpoints for prometheus
management.endpoints.web.exposure.include=prometheus
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}

